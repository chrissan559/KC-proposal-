<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>90-Day Financial Education Empire</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080a;--surface:#0c0f12;--surface2:#111518;
  --border:#181d22;--border2:#1e252c;
  --text:#dde4ec;--muted:#4a5568;--dim:#252d36;
  --gold:#c9a84c;--gold-dim:#c9a84c18;--gold-border:#c9a84c30;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* GRAIN */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:.5}

.container{max-width:780px;margin:0 auto;position:relative;z-index:1}

/* HERO */
.hero{padding:48px 32px 36px;border-bottom:1px solid var(--border)}
.hero-tag{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.hero-tag::after{content:'';flex:1;height:1px;background:var(--gold-border)}
h1{font-family:'Playfair Display',serif;font-size:clamp(28px,6vw,48px);font-weight:900;line-height:1.08;color:#f0f4f8;margin-bottom:8px;letter-spacing:-.02em}
h1 span{color:var(--gold)}
.hero-sub{font-size:14px;color:#5a6a7a;font-style:italic;margin-bottom:24px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.stat{background:var(--surface);padding:14px 16px}
.stat-val{font-family:'IBM Plex Mono',monospace;font-size:clamp(16px,3vw,20px);font-weight:600;color:var(--gold);line-height:1;margin-bottom:4px}
.stat-lbl{font-size:11px;color:var(--muted)}

/* PHASE NAV */
.phase-nav{display:flex;gap:6px;padding:16px 32px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg);position:sticky;top:0;z-index:50;backdrop-filter:blur(8px)}
.p-btn{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;padding:8px 14px;border-radius:3px;border:1px solid;cursor:pointer;transition:all .18s ease;white-space:nowrap}
.p-btn:hover{transform:translateY(-1px)}

/* PHASE WRAPPER */
.phase-wrap{display:none}
.phase-wrap.active{display:block;animation:slideIn .3s ease both}

/* PHASE HEADER */
.p-head{padding:28px 32px 22px;border-bottom:1px solid var(--border)}
.p-meta{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.p-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;padding:4px 10px;border-radius:2px;border:1px solid}
.p-dur{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em}
.p-title{font-family:'Playfair Display',serif;font-size:clamp(22px,4vw,32px);font-weight:700;color:#f0f4f8;margin-bottom:4px;letter-spacing:-.01em}
.p-tagline{font-size:13px;color:#5a6a7a;font-style:italic;margin-bottom:18px;font-family:'Playfair Display',serif}
.goal-block{padding:14px 18px;border-radius:3px;border-left-width:3px;border-left-style:solid;border-top:1px solid;border-right:1px solid;border-bottom:1px solid;font-size:13px;color:#a0aab4;line-height:1.7}
.goal-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.15em;margin-right:8px;text-transform:uppercase}

/* REVENUE PROJECTION */
.rev-block{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.rev-cell{background:var(--surface);padding:14px 18px;border-right:1px solid var(--border2)}
.rev-cell:last-child{border-right:none}
.rev-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.rev-val{font-family:'Playfair Display',serif;font-size:clamp(15px,3vw,20px);font-weight:700;color:#f0f4f8;margin-bottom:2px}
.rev-sub{font-size:11px;color:var(--muted)}

/* TARGETS */
.targets-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.tgt{background:var(--surface2);padding:15px 18px}
.tgt-val{font-family:'IBM Plex Mono',monospace;font-size:clamp(16px,3.5vw,22px);font-weight:600;line-height:1;margin-bottom:4px}
.tgt-lbl{font-size:12px;color:#c0ccd8;font-weight:500;margin-bottom:2px}
.tgt-sub{font-size:11px;color:var(--muted);font-style:italic}

/* INNER TABS */
.i-tabs{display:flex;padding:0 32px;border-bottom:1px solid var(--border)}
.i-tab{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;background:transparent;border:none;border-bottom:2px solid transparent;padding:13px 14px 11px;cursor:pointer;color:var(--muted);transition:all .18s}
.i-tab.active{border-bottom-color:currentColor}
.i-tab:hover{color:#8899aa}

/* PANELS */
.t-panel{display:none;padding:22px 32px 44px}
.t-panel.active{display:block;animation:fadeUp .28s ease both}

/* SECTION HEADS */
.sec-head{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* TASK ITEMS */
.task{display:flex;gap:14px;padding:13px 15px;background:var(--surface);border:1px solid var(--border);border-radius:3px;margin-bottom:8px;align-items:flex-start;transition:border-color .18s}
.task:hover{border-color:var(--border2)}
.task-day{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.05em;min-width:62px;text-align:right;padding-top:2px;flex-shrink:0;line-height:1.4}
.task-line{width:1px;align-self:stretch;min-height:14px;flex-shrink:0;opacity:.3}
.task-body{flex:1}
.task-text{font-size:13px;color:#b0bec8;line-height:1.65;margin-bottom:0}
.task-tip{font-size:11px;color:var(--muted);font-style:italic;margin-top:5px;padding-top:5px;border-top:1px solid var(--border);line-height:1.5}
.task-kpi{display:inline-block;margin-top:6px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.08em;padding:2px 8px;border-radius:2px;border:1px solid}

/* CONTENT ANGLES */
.angle-grid{display:grid;grid-template-columns:repeat(1,1fr);gap:8px;margin-bottom:20px}
.angle{padding:12px 15px;background:var(--surface);border:1px solid var(--border);border-radius:3px;transition:border-color .18s}
.angle:hover{border-color:var(--border2)}
.angle-num{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:4px}
.angle-title{font-size:13px;color:#c0ccd8;font-weight:500;margin-bottom:3px}
.angle-hook{font-size:12px;color:var(--muted);font-style:italic}

/* TOOLS */
.tool{display:grid;grid-template-columns:1fr auto;gap:12px;padding:13px 15px;background:var(--surface);border:1px solid var(--border);border-radius:3px;margin-bottom:8px;align-items:center;transition:border-color .18s}
.tool:hover{border-color:var(--border2)}
.tool-name{font-size:14px;color:#d0dae4;font-weight:600;margin-bottom:3px}
.tool-use{font-size:12px;color:var(--muted)}
.tool-cost{display:inline-block;padding:3px 9px;border-radius:2px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.06em;border:1px solid;margin-bottom:5px}
.tool-link{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#333;display:block;text-align:right}

/* MILESTONES */
.ms{display:flex;gap:13px;padding:13px 15px;background:var(--surface);border:1px solid var(--border);border-radius:3px;margin-bottom:8px;align-items:flex-start;transition:border-color .18s}
.ms:hover{border-color:var(--border2)}
.ms-check{width:22px;height:22px;border-radius:2px;border:2px solid;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:9px;flex-shrink:0;margin-top:1px}
.ms-body{flex:1}
.ms-text{font-size:13px;color:#b0bec8;line-height:1.55;margin-bottom:3px}
.ms-metric{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}
.ms-note{margin-top:14px;padding:13px 15px;border-radius:3px;font-size:12px;color:var(--muted);font-style:italic;line-height:1.65}

/* PRICING TABLE */
.price-table{width:100%;border-collapse:collapse;margin-bottom:20px}
.price-table th{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface)}
.price-table td{font-size:13px;color:#b0bec8;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2)}
.price-table td:first-child{color:#d0dae4;font-weight:500}
.price-table .highlight td{background:var(--surface)}

/* FORMULA BOX */
.formula{padding:16px 18px;border-radius:3px;margin-bottom:16px;border:1px solid}
.formula-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px}
.formula-eq{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#d0dae4;line-height:1.8}
.formula-result{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;margin-top:8px}

/* NAV FOOTER */
.nav-foot{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--border);padding:13px 32px;display:flex;justify-content:space-between;align-items:center;z-index:50}
.n-btn{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;background:transparent;border:1px solid var(--dim);color:var(--muted);padding:8px 16px;border-radius:3px;cursor:pointer;transition:all .18s}
.n-btn:hover:not(:disabled){border-color:#3a4a5a;color:#8899aa}
.n-btn:disabled{color:var(--dim);cursor:not-allowed}
.n-btn.next{font-weight:600}
.n-count{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#2a3540;letter-spacing:.12em}

@keyframes slideIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:520px){
  .hero,.p-head,.phase-nav,.i-tabs,.t-panel,.nav-foot{padding-left:18px;padding-right:18px}
  .stats-row,.rev-block{grid-template-columns:repeat(2,1fr)}
  .targets-grid{grid-template-columns:1fr 1fr}
  .task-day{min-width:52px;font-size:8px}
}
</style>
</head>
<body>
<div class="container">

<!-- HERO -->
<div class="hero">
  <div class="hero-tag">90-Day System · Financial Education Niche · Zero Budget</div>
  <h1>Build a <span>₦500k/month</span><br>Financial Education<br>Empire from Scratch</h1>
  <div class="hero-sub">Engineered for the disciplined. No shortcuts. No noise. Only output.</div>
  <div class="stats-row">
    <div class="stat"><div class="stat-val">₦0</div><div class="stat-lbl">Starting budget</div></div>
    <div class="stat"><div class="stat-val">90 days</div><div class="stat-lbl">Full timeline</div></div>
    <div class="stat"><div class="stat-val">1–3 hrs</div><div class="stat-lbl">Daily input</div></div>
  </div>
</div>

<!-- PHASE NAV -->
<div class="phase-nav" id="phaseNav"></div>

<!-- PHASE CONTENT -->
<div id="phaseContents"></div>

<!-- FOOTER NAV -->
<div class="nav-foot">
  <button class="n-btn" id="prevBtn" onclick="nav(-1)" disabled>← PREV</button>
  <div class="n-count" id="navCount">1 / 4</div>
  <button class="n-btn next" id="nextBtn" onclick="nav(1)">NEXT →</button>
</div>

</div><!-- /container -->

<script>
const C = {
  gold:'#c9a84c', green:'#3d9970', orange:'#e07b39', purple:'#8b6fc7',
  goldD:'#c9a84c18', greenD:'#3d997018', orangeD:'#e07b3918', purpleD:'#8b6fc718',
  goldB:'#c9a84c30', greenB:'#3d997030', orangeB:'#e07b3930', purpleB:'#8b6fc730',
};

const phases = [
{
  id:1, label:'Phase 1', title:'The Machine',
  duration:'Days 1–21', tagline:'Build the content engine before you need it.',
  color:C.gold, dim:C.goldD, border:C.goldB,
  goal:'By Day 21: YouTube channel live with 6 videos, TikTok with 15 posts, free Telegram with 50+ members. The machine is running before anyone pays you anything.',
  rev:[
    {label:'Revenue This Phase', val:'₦0', sub:'intentional — build first'},
    {label:'Asset Being Built', val:'Audience', sub:'your future ATM'},
    {label:'Phase ROI', val:'∞', sub:'zero cost, future income'},
  ],
  targets:[
    {val:'21 days', lbl:'Completion Deadline', sub:'non-negotiable'},
    {val:'6 videos', lbl:'YouTube Output', sub:'2 per week minimum'},
    {val:'15 posts', lbl:'TikTok Output', sub:'daily the first 15 days'},
    {val:'50+ members', lbl:'Free Telegram', sub:'before Phase 2 begins'},
  ],
  tasks:[
    {day:'Day 1', text:'Register YouTube channel. Name formula: [Word] + Finance Nigeria. Examples: ClearFinance Nigeria, WealthCode Nigeria, MoneyMind NG. Pick one. Done.', tip:'Spend max 30 mins on naming. Perfectionism kills momentum.', kpi:'Channel live by end of day'},
    {day:'Day 1', text:'Register TikTok with the same brand name. Set up bio: "Financial education for Nigerian students & young professionals. Free community → link in bio."', tip:'Use your phone. No studio needed. The algorithm rewards frequency not production value.', kpi:'Account active same day'},
    {day:'Day 2', text:'Create Telegram free group. Pin a welcome message: "Welcome to [Channel Name] — Nigeria\'s fastest-growing financial education community. Here you get: weekly money breakdowns, earning strategies, live Q&As. Invite a friend who needs this."', tip:'Seed with 5–10 friends manually. Every group starts at zero.', kpi:'Group live + 10 seed members'},
    {day:'Day 2–3', text:'Open Invideo AI (free plan). Create Video 1: "Why 90% of Nigerian Students Stay Broke After School (And How to Escape)." Use their AI script feature. Pick a professional avatar or text-on-screen style.', tip:'Finance content performs best with data, specific numbers, and relatable pain points.', kpi:'First video exported'},
    {day:'Day 3', text:'Edit in CapCut. Add captions (auto-caption feature). Add a text overlay at 0:15: "Save this — you\'ll need it." Export 1080p for YouTube, 9:16 version for TikTok.', tip:'The "save this" prompt trains the algorithm to boost your reach.', kpi:'Two versions exported'},
    {day:'Day 4', text:'Upload to YouTube. Title: "Why 90% of Nigerian Students Stay Broke After School (And How to Escape)" — Description: include keywords: make money Nigeria, financial education Nigeria, money skills Nigeria. Tag: financial education, Nigeria, students, money.', tip:'YouTube SEO is free traffic. Every description matters.', kpi:'Video live on YouTube'},
    {day:'Day 4', text:'Post TikTok version. Hashtags: #NigeriaFinance #MoneyTipsNigeria #NigerianStudents #FinancialFreedomNigeria #HowToMakeMoneyNigeria. Post between 7–9pm.', tip:'Evening posts perform 40% better in Nigerian time zones.', kpi:'TikTok live, track first 24hr views'},
    {day:'Day 5–7', text:'Video 2: "The 5 Income Streams Every Nigerian Under 30 Should Build." Same production workflow. Upload + post. Share in Telegram group.', kpi:'2 videos live across both platforms'},
    {day:'Day 8–10', text:'Video 3: "How to Make Your First ₦50,000 Online — No Capital Needed." This is your hook video. Strong thumbnail: bold number + shocked face emoji. This video should drive Telegram joins.', tip:'End with: "I break this down step by step in my free Telegram community. Link in bio."', kpi:'Telegram link in every bio + description'},
    {day:'Day 11–13', text:'Video 4: "The Truth About Poverty in Nigeria Nobody Talks About." Controversial + educational = high shares. Use facts and data. Cite CBN, NBS statistics for credibility.', tip:'Data + controversy = shares. Shares = free distribution.', kpi:'Track share rate on this video specifically'},
    {day:'Day 14', text:'Post a Telegram-only resource: "Free PDF: 10 Financial Mistakes Killing Your Future (And How to Fix Each One)." Create this in Canva — 10 slides, export as PDF. This gives people a reason to stay in the group.', tip:'Value drops in Telegram increase retention and word-of-mouth joins.', kpi:'PDF created + posted in group'},
    {day:'Day 15–17', text:'Video 5: "I Tracked Every Naira I Spent for 30 Days — Here\'s What I Found." Personal finance tracking content performs extremely well. Create a fake budget example if needed.', kpi:'5 videos live total'},
    {day:'Day 18–19', text:'Spend one full session studying your analytics. Which video has the highest watch time? Highest saves? Most comments? Note the topic and format. Replicate it.', tip:'Data > instinct. Always. Let the numbers tell you what to make next.', kpi:'Written list of top 3 performing content types'},
    {day:'Day 20–21', text:'Video 6: Double down on your best performer. Same topic category, different angle. This is how you build a content flywheel.', kpi:'6 videos live. Phase 1 complete. Do not advance without 50 Telegram members.'},
  ],
  angles:[
    {title:'"Why Nigerian Schools Teach You to Be an Employee"', hook:'Attack the system. Relatable rage bait with educational value.'},
    {title:'"How I Would Build ₦100k/Month from Zero in Nigeria Today"', hook:'Aspirational + practical. High saves and shares.'},
    {title:'"The Real Reason Your Parents Are Broke (It\'s Not Their Fault)"', hook:'Emotional + educational. Drives comments and discussion.'},
    {title:'"7 Money Rules They Only Teach Rich Kids in Nigeria"', hook:'"Insider knowledge" framing. Extremely shareable.'},
    {title:'"I Invested ₦10,000 for 30 Days — Here\'s Exactly What Happened"', hook:'Experiment format. High curiosity-click rate.'},
    {title:'"The Difference Between How Rich and Poor Nigerians Think About Money"', hook:'Comparison content. Easy to follow, easy to share.'},
    {title:'"How to Save ₦50,000 on a ₦100,000 Salary in Nigeria"', hook:'Specific, practical, solves a real pain point.'},
    {title:'"Why Crypto Is Not Your Way Out (And What Actually Is)"', hook:'Counter-narrative. Generates debate = more engagement.'},
    {title:'"The Side Hustle Every Nigerian Student Can Start This Weekend"', hook:'"This weekend" creates urgency. High action intent.'},
    {title:'"Compound Interest Explained with Naira (The Math That Changes Everything)"', hook:'Educational + mind-blowing. High save rate.'},
  ],
  tools:[
    {name:'Invideo AI', use:'AI-powered video creation — script to video in 10 mins', cost:'Free plan (10 videos/mo)', link:'invideo.io'},
    {name:'CapCut', use:'Edit, caption, resize for TikTok/YouTube Shorts', cost:'Free', link:'capcut.com'},
    {name:'Canva', use:'Thumbnails, PDF resources, brand graphics', cost:'Free plan', link:'canva.com'},
    {name:'ElevenLabs', use:'AI voiceover — professional voice for faceless videos', cost:'Free (10k chars/mo)', link:'elevenlabs.io'},
    {name:'Telegram', use:'Free community hub — your owned audience', cost:'Free', link:'telegram.org'},
    {name:'TikTok', use:'Primary short-form distribution — fastest organic reach in Nigeria', cost:'Free', link:'tiktok.com'},
    {name:'YouTube', use:'Long-form + SEO — compounds over time', cost:'Free', link:'youtube.com'},
    {name:'Claude / ChatGPT', use:'Script writing, content ideas, hook generation', cost:'Free tier', link:'claude.ai'},
    {name:'Google Trends', use:'Find what financial topics Nigerians are searching right now', cost:'Free', link:'trends.google.com'},
    {name:'TikTok Analytics', use:'Track views, saves, shares per video — built in', cost:'Free (built-in)', link:'tiktok.com'},
  ],
  milestones:[
    {text:'YouTube channel live with channel art, bio, and first video uploaded', metric:'Day 4 deadline'},
    {text:'TikTok account set up, first 3 posts live, bio with Telegram link', metric:'Day 5 deadline'},
    {text:'Free Telegram group active with pinned welcome message', metric:'Day 3 deadline'},
    {text:'6 complete videos published on YouTube', metric:'By Day 21'},
    {text:'15 TikTok posts published (same videos + extra short clips)', metric:'By Day 21'},
    {text:'Free Telegram group at 50+ members', metric:'Minimum to advance'},
    {text:'Top 3 performing content types identified from analytics', metric:'Day 19 task complete'},
    {text:'One free PDF resource created and distributed in Telegram', metric:'Day 14 task complete'},
  ],
},
{
  id:2, label:'Phase 2', title:'The Compounding',
  duration:'Days 22–50', tagline:'Volume is the only strategy that works in this game.',
  color:C.green, dim:C.greenD, border:C.greenB,
  goal:'By Day 50: 500+ free Telegram members, 25+ videos total, consistent 4x/week posting rhythm, first signs of viral reach on at least one video. The machine is now running on momentum.',
  rev:[
    {label:'Revenue This Phase', val:'₦0–₦15k', sub:'optional early monetization'},
    {label:'Audience Target', val:'500 members', sub:'Telegram by Day 50'},
    {label:'Video Output', val:'25+ total', sub:'cumulative across platforms'},
  ],
  targets:[
    {val:'4–5x/wk', lbl:'Posting Frequency', sub:'non-negotiable rhythm'},
    {val:'500', lbl:'Free Telegram Members', sub:'gate to Phase 3'},
    {val:'25+ videos', lbl:'Total Content', sub:'by end of Phase 2'},
    {val:'1 viral', lbl:'Breakthrough Video', sub:'100k+ views target'},
  ],
  tasks:[
    {day:'Day 22–24', text:'Batch produce 3 videos in one sitting. Topic cluster: savings. Video A: "How to Save When You Earn Almost Nothing." Video B: "The 50/30/20 Rule — Does It Work in Nigeria?" Video C: "Why Saving Alone Will Never Make You Rich."', tip:'Batching removes the daily decision of "what do I make today." Capricorns thrive on systems not spontaneity.', kpi:'3 videos queued'},
    {day:'Day 24', text:'Schedule all 3 videos across TikTok and YouTube using TikTok\'s built-in scheduler and YouTube Studio\'s schedule feature. Set for Tuesday, Thursday, Saturday — 7:30pm each.', tip:'Consistency of timing trains your audience. They start expecting you.', kpi:'Posts scheduled 1 week in advance'},
    {day:'Day 25', text:'Write and post Telegram content: "5 Savings Accounts in Nigeria With the Highest Interest Rates Right Now (2024 Updated)." Research PiggyVest, Cowrywise, Kuda, GTBank, and Opay rates. Post as a thread.', tip:'Practical, researched content gets shared aggressively in Nigerian WhatsApp groups.', kpi:'Post shared at least 10 times'},
    {day:'Day 26–28', text:'Produce your first "series" content: "Financial Freedom in 30 Days — Day 1." Commit to posting one tip per day in Telegram for 30 days. Announce it to the group.', tip:'Series content locks in daily engagement and dramatically reduces member exits.', kpi:'Day 1 post live, series announced'},
    {day:'Day 29–31', text:'Video cluster: investing. "How to Invest ₦5,000 in Nigeria." "Dollar-Cost Averaging Explained in Naira." "Is PiggyVest Actually Safe? My Honest Review." Upload, post, schedule.', tip:'Reviews and honest takes generate trust faster than educational content alone.', kpi:'3 more videos live'},

let cur = 0;

function build(){
  const nav = document.getElementById('phaseNav');
  const contents = document.getElementById('phaseContents');
  phases.forEach((p,i)=>{
    // nav btn
    const b = document.createElement('button');
    b.className='p-btn'; b.id=`pb${i}`; b.textContent=p.label;
    b.style.borderColor=p.color; b.style.color=i===0?'#111':p.color;
    b.style.background=i===0?p.color:'transparent';
    b.onclick=()=>go(i);
    nav.appendChild(b);

    // content
    const w = document.createElement('div');
    w.className='phase-wrap'+(i===0?' active':''); w.id=`pw${i}`;
    w.innerHTML=buildPhase(p,i);
    contents.appendChild(w);
  });
  updateNav();
}

function buildPhase(p,i){
  const revHTML = p.rev.map(r=>`<div class="rev-cell"><div class="rev-label">${r.label}</div><div class="rev-val">${r.val}</div><div class="rev-sub">${r.sub}</div></div>`).join('');
  const tgtHTML = p.targets.map(t=>`<div class="tgt"><div class="tgt-val" style="color:${p.color}">${t.val}</div><div class="tgt-lbl">${t.lbl}</div><div class="tgt-sub">${t.sub}</div></div>`).join('');

  const tasksHTML = p.tasks.map(t=>`
    <div class="task">
      <div class="task-day" style="color:${p.color}">${t.day}</div>
      <div class="task-line" style="background:${p.color}"></div>
      <div class="task-body">
        <div class="task-text">${t.text}</div>
        ${t.tip?`<div class="task-tip">⟶ ${t.tip}</div>`:''}
        ${t.kpi?`<div class="task-kpi" style="color:${p.color};background:${p.dim};border-color:${p.border}">✓ ${t.kpi}</div>`:''}
      </div>
    </div>`).join('');

  let tab2HTML = '';
  if(p.angles){
    tab2HTML = `<div class="sec-head" style="color:${p.color}">Content Angles — Financial Education Niche</div><div class="angle-grid">${p.angles.map((a,ai)=>`<div class="angle"><div class="angle-num" style="color:${p.color}">ANGLE ${String(ai+1).padStart(2,'0')}</div><div class="angle-title">${a.title}</div><div class="angle-hook">${a.hook}</div></div>`).join('')}</div>`;
  }
  if(p.pricing){
    tab2HTML = `<div class="sec-head" style="color:${p.color}">Pricing Ladder — Financial Education Niche</div>
    <table class="price-table">
      <thead><tr><th>Tier</th><th>Price</th><th>Capacity</th><th>Purpose</th></tr></thead>
      <tbody>${p.pricing.map(r=>`<tr><td>${r.tier}</td><td style="color:${p.color};font-family:'IBM Plex Mono',monospace;font-size:12px">${r.price}</td><td>${r.capacity}</td><td>${r.purpose}</td></tr>`).join('')}</tbody>
    </table>`;
  }
  if(p.formula){
    tab2HTML = `<div class="sec-head" style="color:${p.color}">Revenue Formula</div>
    <div class="formula" style="background:${p.dim};border-color:${p.border}">
      <div class="formula-label" style="color:${p.color}">${p.formula.label}</div>
      <div class="formula-eq">${p.formula.eq}</div>
      <div style="margin:10px 0 4px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#5a6a7a">Example (conservative):</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8899aa;line-height:1.7">${p.formula.example}</div>
      <div class="formula-result" style="color:${p.color}">${p.formula.result}</div>
    </div>`;
  }

  const toolsHTML = p.tools.map(t=>`
    <div class="tool">
      <div><div class="tool-name">${t.name}</div><div class="tool-use">${t.use}</div></div>
      <div style="text-align:right"><span class="tool-cost" style="background:${p.dim};border-color:${p.border};color:${p.color}">${t.cost}</span><span class="tool-link">${t.link}</span></div>
    </div>`).join('');

  const msHTML = p.milestones.map((m,mi)=>`
    <div class="ms">
      <div class="ms-check" style="border-color:${p.color};color:${p.color}">${String(mi+1).padStart(2,'0')}</div>
      <div class="ms-body"><div class="ms-text">${m.text}</div><div class="ms-metric" style="color:${p.color}">${m.metric}</div></div>
    </div>`).join('');

  const tab2Label = p.angles ? 'Angles' : p.pricing ? 'Pricing' : 'Formula';

  return `
    <div class="p-head" style="background:linear-gradient(135deg,${p.dim} 0%,transparent 55%)">
      <div class="p-meta">
        <span class="p-badge" style="color:${p.color};background:${p.dim};border-color:${p.border}">${p.label}</span>
        <span class="p-dur">${p.duration}</span>
      </div>
      <div class="p-title">${p.title}</div>
      <div class="p-tagline">${p.tagline}</div>
      <div class="goal-block" style="background:${p.dim};border-left-color:${p.color};border-top-color:${p.border};border-right-color:${p.border};border-bottom-color:${p.border}">
        <span class="goal-lbl" style="color:${p.color}">Goal →</span>${p.goal}
      </div>
    </div>
    <div class="rev-block">${revHTML}</div>
    <div class="targets-grid">${tgtHTML}</div>
    <div class="i-tabs">
      <button class="i-tab active" style="color:${p.color}" onclick="tab(this,'tp-tasks-${i}',${i})">Tasks</button>
      <button class="i-tab" onclick="tab(this,'tp-tab2-${i}',${i})">${tab2Label}</button>
      <button class="i-tab" onclick="tab(this,'tp-tools-${i}',${i})">Tools</button>
      <button class="i-tab" onclick="tab(this,'tp-ms-${i}',${i})">Milestones</button>
    </div>
    <div class="t-panel active" id="tp-tasks-${i}">${tasksHTML}</div>
    <div class="t-panel" id="tp-tab2-${i}">${tab2HTML}</div>
    <div class="t-panel" id="tp-tools-${i}">${toolsHTML}</div>
    <div class="t-panel" id="tp-ms-${i}">
      ${msHTML}
      <div class="ms-note" style="background:${p.dim};border:1px solid ${p.border}">✦ Every milestone is a checkpoint, not a suggestion. The system only compounds when each phase is genuinely complete.</div>
    </div>`;
}

function go(i){
  document.querySelectorAll('.phase-wrap').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.p-btn').forEach((b,idx)=>{
    b.style.background='transparent'; b.style.color=phases[idx].color;
  });
  document.getElementById(`pw${i}`).classList.add('active');
  const btn=document.getElementById(`pb${i}`);
  btn.style.background=phases[i].color; btn.style.color='#111';
  cur=i; updateNav();
  // reset tabs
  const wrap=document.getElementById(`pw${i}`);
  wrap.querySelectorAll('.i-tab').forEach(t=>{t.classList.remove('active');t.style.color='';});
  wrap.querySelectorAll('.t-panel').forEach(p=>p.classList.remove('active'));
  const ft=wrap.querySelector('.i-tab'); if(ft){ft.classList.add('active');ft.style.color=phases[i].color;}
  const fp=wrap.querySelector('.t-panel'); if(fp) fp.classList.add('active');
}

function tab(btn,panelId,pi){
  const wrap=document.getElementById(`pw${pi}`);
  wrap.querySelectorAll('.i-tab').forEach(t=>{t.classList.remove('active');t.style.color='';});
  wrap.querySelectorAll('.t-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active'); btn.style.color=phases[pi].color;
  document.getElementById(panelId).classList.add('active');
}

function nav(d){const n=cur+d;if(n>=0&&n<phases.length)go(n);}

function updateNav(){
  const p=document.getElementById('prevBtn'),n=document.getElementById('nextBtn'),c=document.getElementById('navCount');
  p.disabled=cur===0; c.textContent=`${cur+1} / ${phases.length}`;
  n.disabled=cur===phases.length-1;
  if(!n.disabled){n.style.background=phases[cur].color;n.style.borderColor=phases[cur].color;n.style.color='#111';}
  else{n.style.background='transparent';n.style.borderColor='var(--dim)';n.style.color='var(--dim)';}
}

build();
</script>
</body>
